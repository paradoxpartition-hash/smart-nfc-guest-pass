<html lang="en">
<head>

       SEO META — edit per language in the `meta` key of each translation
       ============================================================ -->

  <link rel="canonical" href="https://yourdomain.com/" />

  <!-- OpenGraph -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://yourdomain.com/" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:    '#0B1F3B',
            brand:   '#2563EB',
            cta:     '#10B981',
            surface: '#F8FAFC',
            ink:     '#0F172A',
          },
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body:    ['DM Sans', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <style>
    /* ============================================================
       BASE & CUSTOM UTILITIES
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, .font-display { font-family: 'Syne', sans-serif; }

    /* --- Gradient mesh background --- */
    .hero-mesh {
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(37,99,235,0.13) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(16,185,129,0.10) 0%, transparent 70%),
        #F8FAFC;
    }

    .navy-mesh {
      background:
        radial-gradient(ellipse 70% 60% at 10% 50%, rgba(37,99,235,0.25) 0%, transparent 65%),
        radial-gradient(ellipse 50% 60% at 90% 30%, rgba(16,185,129,0.15) 0%, transparent 65%),
        #0B1F3B;
    }

    /* --- Card glass effect --- */
    .glass-card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.9);
    }

    /* --- CTA button --- */
    .btn-cta {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      border-radius: 9999px;
      padding: 0.9rem 2.4rem;
      font-size: 1.05rem;
      letter-spacing: 0.01em;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 4px 24px rgba(16,185,129,0.30);
      display: inline-block;
      cursor: pointer;
      border: none;
    }
    .btn-cta:hover {
      transform: scale(1.04) translateY(-1px);
      box-shadow: 0 8px 32px rgba(16,185,129,0.38);
    }

    /* --- Secondary button --- */
    .btn-outline {
      border: 2px solid #2563EB;
      color: #2563EB;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      border-radius: 9999px;
      padding: 0.85rem 2.2rem;
      font-size: 1rem;
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
      display: inline-block;
      cursor: pointer;
    }
    .btn-outline:hover {
      background: #2563EB;
      color: #fff;
      transform: scale(1.03);
    }

    /* --- Feature card hover --- */
    .feat-card {
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .feat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(11,31,59,0.12);
    }

    /* --- Step connector line (desktop) --- */
    .step-line::after {
      content: '';
      position: absolute;
      top: 2rem;
      right: -50%;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, #2563EB, #10B981);
      opacity: 0.3;
    }

    /* --- Language switcher --- */
    .lang-btn {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.25);
      color: inherit;
      border-radius: 9999px;
      padding: 0.25rem 0.75rem;
      font-size: 0.8rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      letter-spacing: 0.05em;
    }
    .lang-btn.active {
      background: #2563EB;
      border-color: #2563EB;
      color: #fff;
    }
    .lang-btn:hover:not(.active) {
      background: rgba(37,99,235,0.12);
      border-color: #2563EB;
      color: #2563EB;
    }

    /* --- Animated fade-in on scroll --- */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: none;
    }

    /* --- Badge pill --- */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(37,99,235,0.08);
      border: 1px solid rgba(37,99,235,0.2);
      color: #2563EB;
      border-radius: 9999px;
      padding: 0.3rem 1rem;
      font-size: 0.8rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .badge-green {
      background: rgba(16,185,129,0.08);
      border-color: rgba(16,185,129,0.25);
      color: #059669;
    }

    /* Dot pulse animation for badge */
    .dot-pulse {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #10B981;
      animation: pulse 1.8s infinite;
      display: inline-block;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.4); }
    }

    /* NFC icon ring animation */
    .nfc-ring {
      animation: ring 2.4s ease-in-out infinite;
    }
    @keyframes ring {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50%       { transform: scale(1.08); opacity: 1; }
    }

    /* Hide/show utility */
    [data-t] { /* all translatable nodes get this */ }

    @media (max-width: 640px) {
      .step-line::after { display: none; }
    }
  </style>
</head>

<body class="hero-mesh">

     ============================================================ -->
<nav class="fixed top-0 left-0 right-0 z-50 px-6 py-4" style="background:rgba(248,250,252,0.82);backdrop-filter:blur(16px);border-bottom:1px solid rgba(11,31,59,0.06);">

            <!-- Barcode placeholder -->
            <div class="mt-3 flex gap-0.5 justify-center items-end h-8">

                  for (let i = 0; i < 38; i++) {
                    const b = document.createElement('div');
                    b.style.cssText = `width:${Math.random()>0.5?2:1}px;height:${60+Math.random()*40}%;background:rgba(255,255,255,${0.4+Math.random()*0.5});border-radius:2px;`;

/* ============================================================
   LANGUAGE ENGINE
   - Reads ?lang= URL param or localStorage
   - Falls back to browser language, then 'en'
   ============================================================ */
const SUPPORTED = Object.keys(TRANSLATIONS);

function detectLang() {
  // 1. URL param
  const p = new URLSearchParams(window.location.search).get('lang');
  if (p && SUPPORTED.includes(p)) return p;
  // 2. localStorage
  const s = localStorage.getItem('nfc_lang');
  if (s && SUPPORTED.includes(s)) return s;
  // 3. Browser language
  const b = (navigator.language || '').slice(0,2).toLowerCase();
  if (SUPPORTED.includes(b)) return b;
  return 'en';
}

function applyTranslations(lang) {
  const t = TRANSLATIONS[lang];
  if (!t) return;

  // Update all [data-t] elements
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (t[key] !== undefined) {
      // Support \n line breaks in headlines
      el.innerHTML = t[key].replace(/\n/g, '<br>');
    }
  });

  // Update <html lang> attribute
  document.documentElement.setAttribute('lang', lang);

  // Update <title> and meta description dynamically
  if (t.meta_title) document.title = t.meta_title;
  const metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc && t.meta_desc) metaDesc.setAttribute('content', t.meta_desc);

  // Update lang switcher active state
  document.querySelectorAll('[data-lang]').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
  });
}

function setLang(lang) {
  if (!SUPPORTED.includes(lang)) return;

  // Save preference
  localStorage.setItem('nfc_lang', lang);

  // Update URL param without reload
  const url = new URL(window.location.href);
  url.searchParams.set('lang', lang);
  history.replaceState({}, '', url.toString());

  // Apply
  applyTranslations(lang);
}

/* ============================================================
   SCROLL REVEAL
   ============================================================ */
function initReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

/* ============================================================
   INIT
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  const lang = detectLang();
  applyTranslations(lang);

  // Update active button on load
  document.querySelectorAll('[data-lang]').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
  });

  initReveal();
});
</script>
